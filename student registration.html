<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<h2>Student Registration Form</h2>

<form>

    Student Name: 
    <input type="text" name="sname" required><br><br>

    Roll Number: 
    <input type="number" name="roll" required><br><br>

    Department: 
    <select name="dept" required>
        <option value="">Select</option>
        <option>CSE</option>
        <option>IT</option>
        <option>ECE</option>
        <option>EEE</option>
        <option>MECH</option>
        <option>CIVIL</option>
    </select><br><br>

    Year: 
    <input type="number" name="year" min="1" max="4" required><6tdc
br><br>

    Student Mobile Number: 
    <input type="tel" name="mobile" pattern="[0-9]{10}" required><br><br>

    E-mail ID: 
    <input type="email" name="email" required><br><br>

    Password: 
    <input type="password" name="password" minlength="6" required><br><br>

    <input type="submit" value="Register">

</form>

</body>
</html>
